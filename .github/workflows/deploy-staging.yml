name: Deploy on Staging

permissions:
  contents: read

on:
  push:
    branches:
      - "main"
  workflow_dispatch:
    inputs:
      BRANCH:
        description: "Branch to Deploy"
        required: true
        default: "main"
        type: "string"

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
