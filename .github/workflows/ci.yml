name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
      - "ops/**/*.md"
      - "public/**/*.md"
      - ".agents/skills/**/*.md"
  push:
    branches:
      - "main"
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
      - "ops/**/*.md"
      - "public/**/*.md"
      - ".agents/skills/**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke checks
        run: npm run test:smoke

  test-publications:
    name: Test publications
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run publication tests
        run: npm run test:publications

  test-forms:
    name: Test forms
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run form tests
        run: npm run test:forms

  test-routing-seo:
    name: Test routing and SEO
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run routing and SEO tests
        run: npm run test:routing-seo

  test-static-pages:
    name: Test static pages
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run static page tests
        run: npm run test:static-pages

  test-assets-shell:
    name: Test assets and shell
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run asset and shell tests
        run: npm run test:assets-shell

  test-cross-cutting:
    name: Test cross-cutting contracts
    runs-on: ubuntu-latest
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run cross-cutting tests
        run: npm run test:cross-cutting

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - smoke
      - test-publications
      - test-forms
      - test-routing-seo
      - test-static-pages
      - test-assets-shell
      - test-cross-cutting
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
