name: CI

permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
      - ".agents/skills/**/*.md"
  push:
    branches:
      - "main"
    paths-ignore:
      - "README.md"
      - "AGENTS.md"
      - "docs/**"
      - ".agents/skills/**/*.md"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI tests
        run: npm run test:ci

      - name: Build
        run: npm run build
