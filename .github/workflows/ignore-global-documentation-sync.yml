name: Ignore Global publication sync PR

on:
  workflow_dispatch:
    inputs:
      sync_pr_number:
        description: Draft sync PR number to ignore
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  ignore:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit ignore decision and close sync PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.sync_pr_number }}
        run: |
          set -euo pipefail
          pr=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json body,headRefName,state,isDraft,isCrossRepository,url)
          body=$(jq -r .body <<<"$pr")
          parsed=$(BODY="$body" HEAD_BRANCH="$(jq -r .headRefName <<<"$pr")" node --input-type=module - <<'NODE'
          const body = process.env.BODY || "";
          const headBranch = process.env.HEAD_BRANCH || "";
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };
          const matches = [...body.matchAll(/<!--\s*global-documentation-sync:v1\s+(\{[^\n]*\})\s*-->/g)];
          if (matches.length !== 1) fail("sync marker missing");
          const marker = JSON.parse(matches[0][1]);
          const documentationTargetFamilies = new Set(["blog", "whitepapers", "use-cases", "manuals", "events", "glossary", "introduction-deck"]);
          const inferLegacySourceSection = (targetFamily) => {
            if (targetFamily === "news") return "news";
            if (documentationTargetFamilies.has(targetFamily)) return "documentation";
            return null;
          };
          const sourceSection = marker.sourceSection ?? inferLegacySourceSection(marker.targetFamily);
          if (!sourceSection) fail("sync marker missing or unsupported sourceSection");
          const expectedBranch = `content-sync/${sourceSection}-${marker.sourceId}`;
          const legacyBranch = `content-sync/${marker.sourceId}`;
          if (headBranch !== expectedBranch && headBranch !== legacyBranch) fail("sync marker mismatch");
          process.stdout.write(JSON.stringify({ ...marker, sourceSection, expectedBranch, legacyBranch }));
          NODE
          )
          source_section=$(jq -r .sourceSection <<<"$parsed")
          source_id=$(jq -r .sourceId <<<"$parsed")
          [[ "$(jq -r .state <<<"$pr")" == OPEN && "$(jq -r .isDraft <<<"$pr")" == true && "$(jq -r .isCrossRepository <<<"$pr")" == false && ( "$(jq -r .headRefName <<<"$pr")" == "content-sync/$source_section-$source_id" || "$(jq -r .headRefName <<<"$pr")" == "content-sync/$source_id" ) ]] || { echo "not an open same-repository sync Draft PR" >&2; exit 1; }
          source_url=$(sed -n 's/^- Source: //p' <<<"$body" | head -1)
          SOURCE_URL="$source_url" node --input-type=module - <<'NODE'
          const sourceUrl = process.env.SOURCE_URL || "";
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };
          let url;
          try {
            url = new URL(sourceUrl);
          } catch {
            fail("missing canonical source URL");
          }
          url.search = "";
          url.hash = "";
          url.hostname = url.hostname.toLowerCase();
          url.pathname = url.pathname.replace(/\/+$/, "") || "/";
          const normalized = url.toString().replace(/\/$/, url.pathname === "/" ? "/" : "");
          if (url.protocol !== "https:" || normalized !== sourceUrl) fail("source URL must be normalized HTTPS");
          NODE
          SOURCE_ID="$source_id" SOURCE_SECTION="$source_section" SOURCE_URL="$source_url" node --input-type=module - <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const sourceId = process.env.SOURCE_ID;
          const sourceSection = process.env.SOURCE_SECTION;
          const file = ".github/content-sync/ignore.json";
          let values;
          try {
            values = JSON.parse(readFileSync(file, "utf8"));
          } catch (error) {
            throw new Error(`invalid ignore manifest JSON: ${error.message}`);
          }
          if (!Array.isArray(values)) throw new Error("ignore manifest must be an array");
          if (values.some((value) => value?.sourceId === sourceId && (value?.sourceSection || null) === sourceSection)) throw new Error(`already ignored: ${sourceSection}/${sourceId}`);
          values.push({
            sourceSection,
            sourceId,
            sourceCanonicalUrl: process.env.SOURCE_URL,
            reasonCode: "other",
            reason: "Ignored by owner from sync Draft PR.",
            addedBy: "owner",
            addedAt: new Date().toISOString().replace(/\.\d{3}Z$/, "Z"),
          });
          values.sort((left, right) => String(left?.sourceId || "").localeCompare(String(right?.sourceId || "")) || String(left?.sourceSection || "").localeCompare(String(right?.sourceSection || "")));
          writeFileSync(file, `${JSON.stringify(values, null, 2)}\n`);
          NODE
          branch="content-sync-ignore/$source_section-$source_id"
          git config user.name "QueryPie Global publication sync"
          git config user.email "noreply@querypie.com"
          git switch -c "$branch"
          git add .github/content-sync/ignore.json
          git diff --cached --quiet && { echo "no ignore change" >&2; exit 1; }
          git commit -m "chore: ignore Global publication $source_section/$source_id"
          git push --set-upstream origin "$branch"
          ignore_body=$(printf 'Ignore Global publication sync source.\n\n<!-- global-documentation-sync-ignore:v1 {"sourceSection":"%s","sourceId":"%s","syncPr":%s} -->' "$source_section" "$source_id" "$PR_NUMBER")
          ignore_pr=$(gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$branch" --title "Ignore Global publication $source_section/$source_id" --body "$ignore_body")
          gh pr merge --repo "$GITHUB_REPOSITORY" --auto --squash "$ignore_pr"
          echo "ignore_pr=$ignore_pr" >> "$GITHUB_STEP_SUMMARY"
