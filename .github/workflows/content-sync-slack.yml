name: Notify Global publication sync Draft PR

on:
  pull_request_target:
    types: [opened, reopened]
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.draft &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       startsWith(github.event.pull_request.head.ref, 'content-sync/'))
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Send Slack notification
        env:
          WEBHOOK_URL: ${{ secrets.CONTENT_SYNC_SLACK_WEBHOOK_URL }}
          MENTION: ${{ vars.CONTENT_SYNC_SLACK_MENTION }}
          CHANNEL_ID: ${{ vars.CONTENT_SYNC_SLACK_CHANNEL_ID }}
          EVENT_NAME: ${{ github.event_name }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          : "${WEBHOOK_URL:?CONTENT_SYNC_SLACK_WEBHOOK_URL is required}"
          : "${MENTION:?CONTENT_SYNC_SLACK_MENTION is required}"
          : "${CHANNEL_ID:?CONTENT_SYNC_SLACK_CHANNEL_ID is required}"

          payload="$(MENTION="$MENTION" CHANNEL_ID="$CHANNEL_ID" EVENT_NAME="$EVENT_NAME" PR_URL="$PR_URL" PR_TITLE="$PR_TITLE" PR_BRANCH="$PR_BRANCH" PR_BODY="$PR_BODY" node --input-type=module -e '
          const documentationTargetFamilies = new Set(["blog", "whitepapers", "use-cases", "manuals", "events", "glossary", "introduction-deck"]);
          const eventName = process.env.EVENT_NAME || "";
          const mention = process.env.MENTION || "";
          const channelId = process.env.CHANNEL_ID || "";
          const prUrl = process.env.PR_URL || "";
          const prTitle = process.env.PR_TITLE || "";
          const prBranch = process.env.PR_BRANCH || "";
          const prBody = process.env.PR_BODY || "";
          const markerPattern = /<!--\s*global-documentation-sync:v1\s+(\{[^\n]*\})\s*-->/g;
          const sourceIdPattern = /^cnt_\d+$/;
          const targetFamilyPattern = /^[a-z]+(?:-[a-z]+)*$/;
          const runIdPattern = /^[A-Za-z0-9._:-]+$/;
          const inferLegacySourceSection = (targetFamily) => {
            if (targetFamily === "news") return "news";
            if (documentationTargetFamilies.has(targetFamily)) return "documentation";
            return null;
          };
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };
          const compactBlockText = (value) => value.trim().replace(/^[-*]\s+/gm, "• ");
          const buildPreviewPayload = () => ({
            text: "Global publication sync Slack format preview. No action required.",
            blocks: [
              {
                type: "header",
                text: { type: "plain_text", text: "Global publication sync Slack format preview", emoji: true },
              },
              {
                type: "section",
                text: { type: "mrkdwn", text: "English preview only. No action required." },
              },
              {
                type: "section",
                fields: [
                  { type: "mrkdwn", text: "*Source*\n`documentation/cnt_000000`" },
                  { type: "mrkdwn", text: "*Target*\n`blog/0`" },
                  { type: "mrkdwn", text: "*Status*\nFormat preview" },
                  { type: "mrkdwn", text: "*Run*\n`preview-run`" },
                ],
              },
              {
                type: "section",
                text: { type: "mrkdwn", text: "*PR title*\nExample Draft PR preview" },
              },
              {
                type: "context",
                elements: [
                  { type: "mrkdwn", text: `Configured channel: ${channelId} · Preview only · No real PR action` },
                ],
              },
              {
                type: "container",
                title: { type: "plain_text", text: "Validation details", emoji: true },
                is_collapsible: true,
                default_collapsed: true,
                child_blocks: [
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*Pi reviews*\n• Fidelity: preview\n• Contract: preview" },
                  },
                  {
                    type: "section",
                    text: { type: "mrkdwn", text: "*Validation*\n• Representative block structure only" },
                  },
                ],
              },
            ],
          });
          const parseMarker = () => {
            const matches = [...prBody.matchAll(markerPattern)];
            if (matches.length !== 1) fail("expected exactly one global-documentation-sync marker");
            let marker;
            try {
              marker = JSON.parse(matches[0][1]);
            } catch (error) {
              fail(`invalid global-documentation-sync marker JSON: ${error.message}`);
            }
            for (const key of ["sourceId", "targetFamily", "targetId", "runId", "branch"]) {
              if (marker[key] === undefined || marker[key] === null || marker[key] === "") fail(`PR marker missing ${key}`);
            }
            if (!sourceIdPattern.test(String(marker.sourceId))) fail("invalid marker sourceId");
            if (!targetFamilyPattern.test(String(marker.targetFamily))) fail("invalid marker targetFamily");
            if (!Number.isInteger(marker.targetId) || marker.targetId <= 0) fail("invalid marker targetId");
            if (!runIdPattern.test(String(marker.runId))) fail("invalid marker runId");
            const sourceSection = marker.sourceSection ?? inferLegacySourceSection(marker.targetFamily);
            if (!sourceSection) fail("PR marker missing sourceSection");
            const explicitBranch = `content-sync/${sourceSection}-${marker.sourceId}`;
            const legacyBranch = `content-sync/${marker.sourceId}`;
            if (marker.branch !== explicitBranch && marker.branch !== legacyBranch) fail("invalid marker branch");
            if (prBranch !== marker.branch) fail("PR branch does not match sync marker branch");
            const reviewsMatch = prBody.match(/^## Reviews\s*$\n([\s\S]*?)\n^## Validation\s*$/m);
            const validationMatch = prBody.match(/^## Validation\s*$\n([\s\S]*?)\n<!--\s*global-documentation-sync:v1/m);
            if (!reviewsMatch || !validationMatch) fail("PR body missing review or validation sections");
            const reviews = reviewsMatch[1].trim();
            const validation = validationMatch[1].trim();
            if (!reviews || !validation) fail("PR body review or validation section is empty");
            return { ...marker, sourceSection, reviews, validation };
          };
          const buildSuccessPayload = () => {
            const marker = parseMarker();
            const reviewText = `${mention} Please review this Draft PR.`;
            return {
              text: reviewText,
              blocks: [
                {
                  type: "header",
                  text: { type: "plain_text", text: "Global publication Draft PR ready", emoji: true },
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: reviewText },
                },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: `*Source*\n\`${marker.sourceSection}/${marker.sourceId}\`` },
                    { type: "mrkdwn", text: `*Target*\n\`${marker.targetFamily}/${marker.targetId}\`` },
                    { type: "mrkdwn", text: "*Status*\nDraft PR ready" },
                    { type: "mrkdwn", text: `*Run*\n\`${marker.runId}\`` },
                  ],
                },
                {
                  type: "section",
                  text: { type: "mrkdwn", text: `*PR title*\n${prTitle}` },
                  accessory: {
                    type: "button",
                    text: { type: "plain_text", text: "Open Draft PR", emoji: true },
                    url: prUrl,
                    action_id: "open_draft_pr",
                  },
                },
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: "Human review required · Draft only · No automatic merge/deploy" },
                  ],
                },
                {
                  type: "container",
                  title: { type: "plain_text", text: "Validation details", emoji: true },
                  is_collapsible: true,
                  default_collapsed: true,
                  child_blocks: [
                    {
                      type: "section",
                      text: { type: "mrkdwn", text: `*Pi reviews*\n${compactBlockText(marker.reviews)}` },
                    },
                    {
                      type: "section",
                      text: { type: "mrkdwn", text: `*Validation*\n${compactBlockText(marker.validation)}` },
                    },
                  ],
                },
              ],
            };
          };
          process.stdout.write(JSON.stringify(eventName === "workflow_dispatch" ? buildPreviewPayload() : buildSuccessPayload()));
          ')"

          curl --fail --silent --show-error --max-time 15 \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$WEBHOOK_URL"
