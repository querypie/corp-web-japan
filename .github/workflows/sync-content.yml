name: Sync Content from corp-web-contents

on:
  # corp-web-contents의 upload.yml이 완료된 후 이 이벤트를 트리거
  repository_dispatch:
    types: [content-updated]

  # 수동 실행 (GitHub Actions 탭에서 직접 실행 가능)
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync from (default: main)'
        required: false
        default: 'main'

jobs:
  sync:
    name: Generate content data files
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout corp-web-japan
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "branch=${{ github.event.client_payload.branch || 'main' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=main" >> $GITHUB_OUTPUT
          fi

      - name: Generate whitepaper-data.js and blog-data.js
        env:
          GITHUB_TOKEN: ${{ secrets.CONTENTS_REPO_TOKEN }}
          CONTENTS_REPO: querypie/corp-web-contents
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          python3 scripts/generate_content_data.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/whitepaper-data.js public/blog-data.js \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data files
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/whitepaper-data.js public/blog-data.js
          git commit -m "chore: sync content from corp-web-contents [skip ci]

          Triggered by: ${{ github.event_name }}
          Branch: ${{ steps.branch.outputs.branch }}
          Run: ${{ github.run_number }}"
          git push origin ${{ github.ref_name }}

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "✅ No content changes detected, skipping commit."
