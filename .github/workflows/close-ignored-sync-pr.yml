name: Close ignored Global publication sync PR

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_run:
    workflows: [CI]
    types: [completed]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      ignore_pr_number:
        description: Merged ignore PR number to reconcile
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  close-source:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'content-sync-ignore/')) ||
      (github.event_name == 'pull_request_review' &&
       github.event.review.state == 'approved' &&
       startsWith(github.event.pull_request.head.ref, 'content-sync-ignore/'))
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out default branch ignore manifest
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Fetch open sync PR metadata for fallback reconciliation
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh pr list --repo "$REPOSITORY" --state open --limit 1000 --json number,state,isDraft,body,headRefName,isCrossRepository > open-pull-requests.json

      - name: Reconcile ignored sync PRs from main ignore manifest
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          node --input-type=module - <<'NODE' > ignored-sync-plan.json
          import { readFileSync } from "node:fs";
          import { parseGitHubPullRequestList, planIgnoredSyncPullRequestReconciliation } from "./scripts/global-documentation-sync/ignore-reconcile.mjs";

          const ignoreManifest = JSON.parse(readFileSync(".github/content-sync/ignore.json", "utf8"));
          const openPullRequests = parseGitHubPullRequestList(readFileSync("open-pull-requests.json", "utf8"));
          const plan = planIgnoredSyncPullRequestReconciliation({ ignoreManifest, pullRequests: openPullRequests });
          process.stdout.write(JSON.stringify(plan));
          NODE

          jq -c '.actions[]' ignored-sync-plan.json | while read -r action; do
            source_pr=$(jq -r .pullRequestNumber <<<"$action")
            branch_to_delete=$(jq -r .branchToDelete <<<"$action")
            source=$(gh pr view "$source_pr" --repo "$REPOSITORY" --json state,isDraft,headRefName,isCrossRepository)
            if [[ "$(jq -r .state <<<"$source")" == OPEN ]]; then
              [[ "$(jq -r .isCrossRepository <<<"$source")" == false && "$(jq -r .isDraft <<<"$source")" == true && "$(jq -r .headRefName <<<"$source")" == "$branch_to_delete" ]] || {
                echo "planned source PR is no longer an open same-repository Draft sync PR" >&2
                exit 1
              }
              gh pr close "$source_pr" --repo "$REPOSITORY"
            fi
            gh api --method DELETE "repos/$REPOSITORY/git/refs/heads/$branch_to_delete" 2>/dev/null || {
              gh api "repos/$REPOSITORY/git/ref/heads/$branch_to_delete" >/dev/null 2>&1 && exit 1 || true
            }
          done

      - name: Close source sync PR from merged ignore marker
        if: github.event_name != 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          DISPATCH_PR: ${{ inputs.ignore_pr_number }}
          RUN_PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          RUN_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REVIEW_PR: ${{ github.event.pull_request.number }}
          REVIEW_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          ignore_pr="${DISPATCH_PR:-${RUN_PR:-$REVIEW_PR}}"
          RUN_BRANCH="${RUN_BRANCH:-$REVIEW_BRANCH}"
          if [[ -z "$ignore_pr" && "$RUN_BRANCH" =~ ^content-sync-ignore/([a-z]+-)?cnt_[0-9]+$ ]]; then
            ignore_pr=$(gh pr list --repo "$REPOSITORY" --state merged --head "$RUN_BRANCH" --json number --limit 2 --jq 'if length == 1 then .[0].number else empty end')
          fi
          [[ "$ignore_pr" =~ ^[0-9]+$ ]] || { echo "missing or ambiguous ignore PR for branch $RUN_BRANCH" >&2; exit 1; }

          for attempt in $(seq 1 12); do
            ignore=$(gh pr view "$ignore_pr" --repo "$REPOSITORY" --json state,headRefName,body,isCrossRepository)
            [[ "$(jq -r .state <<<"$ignore")" == MERGED ]] && break
            sleep 5
          done
          [[ "$(jq -r .state <<<"$ignore")" == MERGED && "$(jq -r .isCrossRepository <<<"$ignore")" == false && "$(jq -r .headRefName <<<"$ignore")" =~ ^content-sync-ignore/([a-z]+-)?cnt_[0-9]+$ ]] || { echo "ignore PR is not a merged same-repository sync-ignore PR" >&2; exit 1; }

          ignore_parsed=$(BODY="$(jq -r .body <<<"$ignore")" HEAD_BRANCH="$(jq -r .headRefName <<<"$ignore")" node --input-type=module - <<'NODE'
          const body = process.env.BODY || "";
          const headBranch = process.env.HEAD_BRANCH || "";
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };
          const matches = [...body.matchAll(/<!--\s*global-documentation-sync-ignore:v1\s+(\{[^\n]*\})\s*-->/g)];
          if (matches.length !== 1) fail("ignore marker missing");
          const marker = JSON.parse(matches[0][1]);
          if (!marker.sourceSection || !marker.sourceId || !Number.isInteger(Number(marker.syncPr))) fail("ignore marker missing sourceSection, sourceId, or syncPr");
          const expectedBranch = `content-sync-ignore/${marker.sourceSection}-${marker.sourceId}`;
          if (headBranch !== expectedBranch) fail("ignore marker mismatch");
          process.stdout.write(JSON.stringify(marker));
          NODE
          )
          source_id=$(jq -r .sourceId <<<"$ignore_parsed")
          source_section=$(jq -r .sourceSection <<<"$ignore_parsed")
          source_pr=$(jq -r .syncPr <<<"$ignore_parsed")

          source=$(gh pr view "$source_pr" --repo "$REPOSITORY" --json state,isDraft,headRefName,body,isCrossRepository)
          [[ "$(jq -r .isCrossRepository <<<"$source")" == false ]] || { echo "source PR is not same-repository or does not match sync marker" >&2; exit 1; }
          source_parsed=$(BODY="$(jq -r .body <<<"$source")" HEAD_BRANCH="$(jq -r .headRefName <<<"$source")" SOURCE_ID="$source_id" SOURCE_SECTION="$source_section" node --input-type=module - <<'NODE'
          const body = process.env.BODY || "";
          const headBranch = process.env.HEAD_BRANCH || "";
          const sourceId = process.env.SOURCE_ID || "";
          const sourceSection = process.env.SOURCE_SECTION || "";
          const fail = (message) => {
            console.error(message);
            process.exit(1);
          };
          const matches = [...body.matchAll(/<!--\s*global-documentation-sync:v1\s+(\{[^\n]*\})\s*-->/g)];
          if (matches.length !== 1) fail("source marker mismatch");
          const marker = JSON.parse(matches[0][1]);
          const documentationTargetFamilies = new Set(["blog", "whitepapers", "use-cases", "manuals", "events", "glossary", "introduction-deck"]);
          const inferLegacySourceSection = (targetFamily) => {
            if (targetFamily === "news") return "news";
            if (documentationTargetFamilies.has(targetFamily)) return "documentation";
            return null;
          };
          const markerSection = marker.sourceSection ?? inferLegacySourceSection(marker.targetFamily);
          if (!markerSection) fail("source marker missing or unsupported sourceSection");
          const expectedBranch = `content-sync/${markerSection}-${marker.sourceId}`;
          const legacyBranch = `content-sync/${marker.sourceId}`;
          if (marker.sourceId !== sourceId || markerSection !== sourceSection) fail("source marker mismatch");
          if (headBranch !== expectedBranch && headBranch !== legacyBranch) fail("source marker mismatch");
          process.stdout.write(JSON.stringify({ branchToDelete: headBranch }));
          NODE
          )
          branch_to_delete=$(jq -r .branchToDelete <<<"$source_parsed")
          if [[ "$(jq -r .state <<<"$source")" == OPEN ]]; then
            [[ "$(jq -r .isDraft <<<"$source")" == true ]] || { echo "source PR is not Draft" >&2; exit 1; }
            gh pr close "$source_pr" --repo "$REPOSITORY"
          fi
          gh api --method DELETE "repos/$REPOSITORY/git/refs/heads/$branch_to_delete" 2>/dev/null || {
            gh api "repos/$REPOSITORY/git/ref/heads/$branch_to_delete" >/dev/null 2>&1 && exit 1 || true
          }
